<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跑马灯 - Marquee</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Space+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans SC', sans-serif;
      overflow: hidden;
    }

    .marquee-container {
      width: 100%;
      overflow: hidden;
      padding: 2rem 0;
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .marquee {
      display: flex;
      width: max-content;
      animation: marquee 20s linear infinite;
    }

    .marquee-content {
      display: flex;
      gap: 4rem;
      padding-right: 4rem;
    }

    .marquee-content span {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7c3aed, #ff6b6b, #00d4ff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 4s ease infinite;
      white-space: nowrap;
    }

    .marquee-container:nth-child(2) {
      margin-top: 2rem;
    }

    .marquee-container:nth-child(2) .marquee {
      animation-direction: reverse;
    }

    .marquee-container:nth-child(2) .marquee-content span {
      font-size: 1.5rem;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff6b6b);
      background-size: 300% 100%;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    @keyframes gradient {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .title {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .dots {
      display: flex;
      gap: 0.5rem;
      margin-top: 3rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7c3aed;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
      background: #00d4ff;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
      background: #ff6b6b;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.3;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }
  </style>
</head>
<body>
  <div class="title">✦ Marquee Animation ✦</div>

  <div class="marquee-container">
    <div class="marquee">
      <div class="marquee-content">
        <span>🚀 欢迎使用跑马灯效果</span>
        <span>✨ 流光溢彩的文字动画</span>
        <span>🌟 现代美观的设计风格</span>
        <span>💫 持续滚动展示内容</span>
      </div>
      <div class="marquee-content" aria-hidden="true">
        <span>🚀 欢迎使用跑马灯效果</span>
        <span>✨ 流光溢彩的文字动画</span>
        <span>🌟 现代美观的设计风格</span>
        <span>💫 持续滚动展示内容</span>
      </div>
    </div>
  </div>

  <div class="marquee-container">
    <div class="marquee">
      <div class="marquee-content">
        <span>技术驱动 · 创新无限 · 未来已来</span>
        <span>代码艺术 · 优雅呈现 · 精致体验</span>
        <span>数字时代 · 智能生活 · 科技赋能</span>
      </div>
      <div class="marquee-content" aria-hidden="true">
        <span>技术驱动 · 创新无限 · 未来已来</span>
        <span>代码艺术 · 优雅呈现 · 精致体验</span>
        <span>数字时代 · 智能生活 · 科技赋能</span>
      </div>
    </div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
