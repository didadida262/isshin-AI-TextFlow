[[permission]]
identifier = "allow-login"
description = "Allows user login"
commands.allow = ["login"]

[[permission]]
identifier = "allow-create-project"
description = "Allows creating projects"
commands.allow = ["create_project"]

[[permission]]
identifier = "allow-list-projects"
description = "Allows listing projects"
commands.allow = ["list_projects"]

[[permission]]
identifier = "allow-update-project"
description = "Allows updating projects"
commands.allow = ["update_project"]

[[permission]]
identifier = "allow-read-project-file"
description = "Allows reading project files"
commands.allow = ["read_project_file"]

[[permission]]
identifier = "allow-list-art-skills"
description = "Allows listing visual manual skills"
commands.allow = ["list_art_skills"]

[[permission]]
identifier = "allow-list-story-skills"
description = "Allows listing director manual skills"
commands.allow = ["list_story_skills"]

[[permission]]
identifier = "allow-get-art-skill-detail"
description = "Allows loading visual manual detail"
commands.allow = ["get_art_skill_detail"]

[[permission]]
identifier = "allow-get-story-skill-detail"
description = "Allows loading director manual detail"
commands.allow = ["get_story_skill_detail"]

[[permission]]
identifier = "allow-novel"
description = "Allows novel import and chapter persistence"
commands.allow = [
  "import_novel",
  "get_novel_source",
  "list_novel_chapters",
  "update_novel_chapter_event",
]

[[permission]]
identifier = "allow-workflow"
description = "Allows project workflow node queries"
commands.allow = [
  "list_project_workflow_nodes",
  "get_project_workflow_node_detail",
]

[[permission]]
identifier = "allow-llm"
description = "Allows LLM requests with Rust-side logging"
commands.allow = ["llm_chat_completion", "llm_log_outbound", "llm_log_inbound"]

[[permission]]
identifier = "allow-assets"
description = "Allows project asset persistence"
commands.allow = [
  "list_project_assets",
  "create_project_asset",
  "update_project_asset",
  "delete_project_asset",
  "generate_image",
]

[[permission]]
identifier = "allow-script"
description = "Allows script work data and episode script persistence"
commands.allow = [
  "get_script_work_data",
  "set_script_work_data",
  "list_scripts",
  "upsert_script",
]
